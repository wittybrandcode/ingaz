<style>
  :root {
    --brand-primary: #4F46E5;
    --transition-speed: 0.3s;
  }
  
  * {
    font-family: 'Cairo', 'IBM Plex Sans Arabic', sans-serif;
    scrollbar-width: thin;
    scrollbar-color: #E2E8F0 transparent;
  }

  body {
    background-color: #F8FAFC;
    color: #1E293B;
    overflow: hidden;
  }

  /* Glassmorphism effects */
  .glass-card {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
  }

  /* Animations */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .animate-slide-in {
    animation: slideIn var(--transition-speed) ease-out forwards;
  }

  .stagger-1 { animation-delay: 0.1s; }
  .stagger-2 { animation-delay: 0.2s; }
  .stagger-3 { animation-delay: 0.3s; }

  .skeleton {
    background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite linear;
  }

  /* Custom Sidebar */
  .sidebar-link {
    transition: all var(--transition-speed);
    position: relative;
    overflow: hidden;
  }

  .sidebar-link.active::before {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--brand-primary);
    border-radius: 4px 0 0 4px;
  }

  /* Card Hover */
  .interactive-card {
    transition: all var(--transition-speed);
  }

  .interactive-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 24px -4px rgba(0, 0, 0, 0.1);
  }

  /* Custom Checkbox Appearance for Subtasks */
  .custom-checkbox {
    appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid #CBD5E1;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .custom-checkbox:checked {
    background-color: #10B981;
    border-color: #10B981;
  }

  .custom-checkbox:checked::after {
    content: '✓';
    color: white;
    font-size: 12px;
    font-weight: bold;
  }

  /* Progress Ring */
  .progress-ring__circle {
    transition: stroke-dashoffset 0.35s;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
  }
</style>
</head>

                <div className="text-sm font-bold text-slate-900">أحمد بن علي</div>
                <div className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">مدير عام</div>
              </div>
              <div className="w-11 h-11 rounded-2xl bg-brand-primary shadow-lg shadow-indigo-100 flex items-center justify-center text-white font-bold text-lg">أ</div>
            </div>
            <div className="h-8 w-px bg-slate-200"></div>
            <button className="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:text-brand-primary hover:border-brand-primary transition-all relative">
              <Icon name="bell" size={20} />
              <span className="absolute top-2 left-2 w-2.5 h-2.5 bg-brand-danger rounded-full border-2 border-white"></span>
            </button>
          </div>
        </header>

        {/* Content Area */}
        <div className="flex-1 px-10 pt-4 overflow-y-auto">
          {selectedProject ? (
            <TaskView 
              project={selectedProject} 
              tasks={TASKS} 
              onBack={() => setSelectedProject(null)} 
            />
          ) : (
            <div className="animate-slide-in">
              <div className="flex items-center justify-between mb-8">
                <div>
                  <h1 className="text-3xl font-extrabold text-slate-900 mb-1">أهلاً بك، أحمد 👋</h1>
                  <p className="text-slate-500 font-medium text-sm">لديك <span className="text-brand-primary font-bold">5 مهام</span> تحتاج اهتمامك اليوم</p>
                </div>
                <div className="flex gap-3">
                  <div className="bg-white rounded-2xl p-3 shadow-soft border border-slate-100 flex items-center gap-3">
                    <span className="text-xs font-bold text-slate-500">فلترة حسب:</span>
                    <select className="text-xs font-bold text-slate-900 bg-transparent outline-none">
                      <option>الكل</option>
                      <option>النشطة</option>
                      <option>المكتملة</option>
                    </select>
                  </div>
                </div>
              </div>

              {/* Stats Row */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                <StatCard label="المشاريع النشطة" value="12" trend="+3" trendUp={true} icon="projects" />
                <StatCard label="المهام المكتملة" value="156" trend="+12%" trendUp={true} icon="tasks" />
                <StatCard label="أداء الفريق" value="94%" trend="-2%" trendUp={false} icon="users" />
                <StatCard label="رصيد النقاط" value="10/10" trend="مثالي" trendUp={true} icon="dashboard" />
              </div>

              {/* Projects Grid */}
              <div className="mb-12">
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-3">
                    المشاريع الحالية
                    <span className="bg-indigo-50 text-indigo-600 text-xs px-2.5 py-1 rounded-full">{PROJECTS.length}</span>
                  </h2>
                  <button className="text-sm font-bold text-brand-primary hover:underline transition-all">عرض الكل</button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                  {PROJECTS.map(proj => (
                    <ProjectCard 
                      key={proj.id} 
                      project={proj} 
                      onClick={setSelectedProject} 
                    />
                  ))}
                  {/* Add New Project Placeholder */}
                  <div className="border-2 border-dashed border-slate-200 rounded-[32px] flex flex-col items-center justify-center p-6 text-slate-400 hover:border-brand-primary hover:text-brand-primary transition-all cursor-pointer group">
                    <div className="w-14 h-14 rounded-2xl bg-slate-50 flex items-center justify-center mb-4 group-hover:bg-indigo-50 transition-colors">
                      <span className="text-3xl font-light">+</span>
                    </div>
                    <span className="text-sm font-bold">إنشاء مشروع جديد</span>
                  </div>
                </div>
              </div>
              
              {/* Activity Section Placeholder */}
              <div className="mb-12 grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div className="lg:col-span-2 glass-card p-8 rounded-[40px]">
                  <h3 className="text-xl font-bold text-slate-900 mb-6">نشاطات المهام الأخيرة</h3>
                  <div className="space-y-6">
                    {[1, 2].map(i => (
                      <div key={i} className="flex gap-4 group">
                        <div className="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold shrink-0">أ</div>
                        <div className="flex-1 pb-6 border-b border-slate-100 group-last:border-0">
                          <div className="flex justify-between items-start mb-1">
                            <h5 className="text-sm font-bold text-slate-800">أحمد قام بتسليم "تصميم الواجهة"</h5>
                            <span className="text-[10px] text-slate-400 font-medium italic">منذ ساعتين</span>
                          </div>
                          <p className="text-xs text-slate-500 line-clamp-2">لقد أكملت جميع المهام الفرعية المتعلقة بتصميم واجهة لوحة التحكم، يرجى المراجعة والترشيح.</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="glass-card p-8 rounded-[40px] bg-slate-900 text-white">
                  <h3 className="text-xl font-bold mb-6">أفضل الموظفين</h3>
                  <div className="space-y-6">
                    {[1, 2, 3].map(i => (
                      <div key={i} className="flex items-center justify-between">
                        <div className="flex items-center gap-3">
                          <div className="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center font-bold text-brand-accent">
                            {['س','خ','ف'][i-1]}
                          </div>
                          <div>
                            <div className="text-sm font-bold">
                              {['سارة محمد','خالد يوسف','فاطمة حسن'][i-1]}
                            </div>
                            <div className="text-[10px] text-slate-500">1{i} مهمة مكتملة</div>
                          </div>
                        </div>
                        <div className="text-xs font-bold text-brand-success">10/10</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard />);
</script>

</body>
</html>
