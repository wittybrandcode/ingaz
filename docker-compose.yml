version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ingaz
      POSTGRES_USER: ingaz
      POSTGRES_PASSWORD: ingaz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingaz -d ingaz"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://ingaz:ingaz@db:5432/ingaz
      JWT_SECRET: change-me-in-production
      NODE_ENV: production
      ALLOWED_ORIGINS: http://localhost:80
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
