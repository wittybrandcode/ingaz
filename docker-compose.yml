version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ingaz
      POSTGRES_USER: ingaz
      POSTGRES_PASSWORD: ingaz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://ingaz:ingaz@db:5432/ingaz
      JWT_SECRET: change-me-in-production
      NODE_ENV: production
    depends_on:
      - db
volumes:
  pgdata:
